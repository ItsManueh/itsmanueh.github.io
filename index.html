<script src="src/npm/typeit.min.js"></script>
<script>
    var totalStrings = ["Computer technician", "IT" , "Photo and video editor", "PreWeb Designer - Developer", "Freelance","Programmer & Dev on FiveM (GTAV Roleplay)"];
    var typeIt = new TypeIt("#scroller", { speed: 75, loop: true, waitUntilVisible: true });

    totalStrings.forEach(function (str) {
        typeIt.type(str);
        typeIt.pause(1300);
        typeIt.delete(str.length);
    })

    typeIt.go();
</script>
